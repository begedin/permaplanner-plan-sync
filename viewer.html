<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Permaplanner Guilds Viewer</title>
    <style>
      body {
        margin: 0;
        padding: 1rem;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: #111827;
        background: #f9fafb;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0.25rem 0;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 0.75rem;
        margin: 0.75rem 0;
      }
      .name {
        font-weight: 600;
      }
      .meta {
        color: #4b5563;
        font-size: 0.875rem;
      }
      .error {
        color: #b91c1c;
      }
      code {
        background: #f3f4f6;
        padding: 0.125rem 0.25rem;
        border-radius: 0.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Permaplanner Guilds</h1>
      <p id="source" class="meta"></p>
      <div id="status" class="meta"></div>
      <section id="guilds"></section>
    </main>
    <script>
      const sourceEl = document.getElementById('source');
      const statusEl = document.getElementById('status');
      const guildsEl = document.getElementById('guilds');

      const renderError = (message) => {
        statusEl.textContent = message;
        statusEl.className = 'error';
      };

      const params = new URLSearchParams(window.location.search);
      const guildsPath = params.get('guilds') || '';
      if (!guildsPath) {
        renderError('Missing query param: guilds');
      } else {
        sourceEl.textContent = 'Source: ' + guildsPath;
        fetch(guildsPath)
          .then((res) => {
            if (!res.ok) {
              throw new Error('HTTP ' + res.status);
            }
            return res.json();
          })
          .then((json) => {
            const guilds = Array.isArray(json?.guilds) ? json.guilds : [];
            statusEl.textContent = 'Guilds: ' + guilds.length;
            guilds.forEach((guild) => {
              const card = document.createElement('article');
              card.className = 'card';

              const name = document.createElement('div');
              name.className = 'name';
              name.textContent = guild?.name || '(unnamed guild)';
              card.appendChild(name);

              const plantCount = Array.isArray(guild?.plants) ? guild.plants.length : 0;
              const meta = document.createElement('div');
              meta.className = 'meta';
              meta.textContent = 'Plants: ' + plantCount + ' · ID: ' + (guild?.id || 'n/a');
              card.appendChild(meta);

              guildsEl.appendChild(card);
            });
          })
          .catch((err) => {
            renderError('Could not load ' + guildsPath + ': ' + err.message);
          });
      }
    </script>
  </body>
</html>
