<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Permaplanner Guilds Viewer</title>
    <style>
      body {
        margin: 0;
        padding: 1rem;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        color: #111827;
        background: #f9fafb;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }
      p {
        margin: 0.25rem 0;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 0.75rem;
        margin: 0.75rem 0;
      }
      .plain {
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.8125rem;
        line-height: 1.4;
        color: #1f2937;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 0.375rem;
        padding: 0.625rem;
      }
      .name {
        font-weight: 600;
      }
      .meta {
        color: #4b5563;
        font-size: 0.875rem;
      }
      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Permaplanner Guilds</h1>
      <p
        id="source"
        class="meta"
      ></p>
      <div
        id="status"
        class="meta"
      ></div>
      <section id="guilds"></section>
    </main>
    <script>
      const sourceEl = document.getElementById('source');
      const statusEl = document.getElementById('status');
      const guildsEl = document.getElementById('guilds');
      const growthPhaseLabel = {
        sown: 'Sown',
        germinated: 'Germinated',
        transplanted: 'Transplanted',
        young: 'Young',
        established: 'Established',
        producing: 'Producing',
        post_production: 'Post-production',
      };
      const vigorLabel = {
        1: 'Struggling',
        2: 'Stressed',
        3: 'Fair',
        4: 'Healthy',
        5: 'Thriving',
      };

      const renderError = (message) => {
        statusEl.textContent = message;
        statusEl.className = 'error';
      };

      const params = new URLSearchParams(window.location.search);
      const guildsPath = params.get('guilds') || '';
      const asGuildArray = (json) => {
        if (Array.isArray(json)) {
          return json;
        }
        if (Array.isArray(json?.guilds)) {
          return json.guilds;
        }
        return [];
      };
      const plantNameText = (plant) => {
        if (typeof plant?.name === 'string' && plant.name.trim()) {
          return plant.name.trim();
        }
        if (typeof plant?.nameOrCultivar === 'string' && plant.nameOrCultivar.trim()) {
          return plant.nameOrCultivar.trim();
        }
        if (typeof plant?.plantId === 'string' && plant.plantId.trim()) {
          return plant.plantId.trim();
        }
        return '(unknown plant)';
      };
      const plantConditionText = (plant) => {
        const numeric = Number(plant?.vigor);
        const normalized = Number.isFinite(numeric) ? Math.round(numeric) : null;
        if (normalized && normalized >= 1 && normalized <= 5) {
          return vigorLabel[String(normalized)] + ' (' + String(normalized) + '/5)';
        }
        if (typeof plant?.condition === 'string' && plant.condition.trim()) {
          return plant.condition.trim();
        }
        return 'unknown';
      };
      const plantStageText = (plant) => {
        if (typeof plant?.growthPhase === 'string') {
          return growthPhaseLabel[plant.growthPhase] || plant.growthPhase;
        }
        if (typeof plant?.stage === 'string' && plant.stage.trim()) {
          return plant.stage.trim();
        }
        return 'unknown';
      };
      const guildPlainText = (guild) => {
        const lines = [];
        lines.push(guild?.name || '(unnamed guild)');
        lines.push('');
        lines.push('- plants:');
        if (Array.isArray(guild?.plants) && guild.plants.length > 0) {
          guild.plants.forEach((plant) => {
            lines.push('  - ' + plantNameText(plant));
            lines.push('    - condition: ' + plantConditionText(plant));
            lines.push('    - stage: ' + plantStageText(plant));
          });
        } else {
          lines.push('  - (none)');
        }
        const mulchLevel = Number.isFinite(Number(guild?.mulchLevel))
          ? Math.max(1, Math.min(5, Math.round(Number(guild.mulchLevel))))
          : 1;
        lines.push('- mulch level: ' + String(mulchLevel) + '/5');
        const note =
          typeof guild?.note === 'string' && guild.note.trim()
            ? guild.note.trim()
            : '(none)';
        lines.push('- note: ' + note);
        return lines.join('\n');
      };

      if (!guildsPath) {
        renderError('Missing query param: guilds');
      } else {
        sourceEl.textContent = 'Source: ' + guildsPath;
        fetch(guildsPath)
          .then((res) => {
            if (!res.ok) {
              throw new Error('HTTP ' + res.status);
            }
            return res.json();
          })
          .then((json) => {
            const guilds = asGuildArray(json);
            statusEl.textContent = 'Guilds: ' + guilds.length;
            guilds.forEach((guild, index) => {
              const card = document.createElement('article');
              card.className = 'card';

              const name = document.createElement('div');
              name.className = 'name';
              name.textContent =
                (guild?.name || '(unnamed guild)') + ' (#' + String(index + 1) + ')';
              card.appendChild(name);

              const plantCount = Array.isArray(guild?.plants) ? guild.plants.length : 0;
              const meta = document.createElement('div');
              meta.className = 'meta';
              meta.textContent =
                'Plants: ' + plantCount + ' · ID: ' + (guild?.id || 'n/a');
              card.appendChild(meta);

              const guildText = document.createElement('pre');
              guildText.className = 'plain';
              guildText.textContent = guildPlainText(guild);
              card.appendChild(guildText);

              guildsEl.appendChild(card);
            });
          })
          .catch((err) => {
            renderError('Could not load ' + guildsPath + ': ' + err.message);
          });
      }
    </script>
  </body>
</html>
